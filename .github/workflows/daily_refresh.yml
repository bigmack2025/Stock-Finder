name: Daily data refresh

# Runs every day at 11 UTC (~7am ET) — pulls fresh valuations and prunes
# stale EDGAR cache so the live site has fresh numbers each morning.

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}  # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install pandas openpyxl pyarrow numpy yfinance

      - name: Run refresh
        run: python refresh_all.py --quiet

      - name: Commit refreshed parquets
        run: |
          git config user.name  "biotech-engine-bot"
          git config user.email "bot@example.com"
          git add data/current_universe.parquet data/valuations.parquet data/_refresh_health.json data/archive/ || true
          git commit -m "chore: nightly data refresh $(date -Iseconds)" || echo "no changes"
          git push || echo "nothing to push"

      - name: Upload health on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-health
          path: data/_refresh_health.json
